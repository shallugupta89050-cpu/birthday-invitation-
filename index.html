<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shallu's Birthday Invitation 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#ffb6d9,#ffd6ea,#ffeef8);
display:flex;
justify-content:center;
align-items:center;
}

body::before{
content:"";
position:fixed;
width:300%;
height:300%;
background:
radial-gradient(circle,#ffffff55 2px,transparent 3px);
background-size:50px 50px;
animation:sparkle 25s linear infinite;
opacity:.5;
}

@keyframes sparkle{
from{transform:translate(0,0);}
to{transform:translate(-300px,-300px);}
}

.scene{
perspective:1500px;
}

.envelope{
width:330px;
height:230px;
position:relative;
cursor:pointer;
transition:.8s;
transform-style:preserve-3d;
}

.front{
position:absolute;
width:100%;
height:100%;
background:#ff77b7;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
font-weight:bold;
color:white;
box-shadow:0 20px 40px rgba(0,0,0,.2);
}

.flap{
position:absolute;
width:100%;
height:120px;
background:#ff4fa3;
clip-path:polygon(0 0,100% 0,50% 100%);
transform-origin:top;
transition:1s;
border-radius:15px 15px 0 0;
z-index:3;
}

.card{
position:absolute;
width:300px;
left:15px;
top:15px;
background:white;
padding:25px;
border-radius:18px;
text-align:center;
color:#ff4d94;
transform:translateY(20px);
transition:1s;
z-index:1;
box-shadow:0 10px 30px rgba(0,0,0,.15);
opacity:0;
}

.open .flap{
transform:rotateX(180deg);
}

.open .card{
transform:translateY(-140px);
opacity:1;
}

h1{
font-family:"Great Vibes",cursive;
font-size:50px;
margin-bottom:10px;
}

h2{
margin:10px 0;
}

button{
padding:12px 25px;
border:none;
border-radius:40px;
margin:15px;
font-size:18px;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

#yes{
background:#ff4d94;
color:white;
}

#yes:hover{
transform:scale(1.08);
}

#no{
background:#ffe1ef;
color:#ff4d94;
position:relative;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

.result{
display:none;
position:fixed;
inset:0;
background:#ffb6d9;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
font-size:30px;
text-align:center;
}

.result h1{
font-size:70px;
}

.heart{
position:fixed;
font-size:24px;
animation:float 8s linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-120vh);
opacity:0;
}
}

small{
display:block;
margin-top:10px;
color:#888;
}

</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="scene">

<div class="envelope" id="env">

<div class="flap"></div>

<div class="front">
Tap To Open 💌
</div>

<div class="card">

<h1>You're Invited</h1>

<h2>🎂 Shallu Gupta's Birthday 🎂</h2>

<p><b>📅 Date</b><br>8 July 2026</p>

<p><b>🕗 Time</b><br>8:00 PM</p>

<p><b>📍 Venue</b><br>
D-16/353<br>
Sector 7, Rohini<br>
Delhi
</p>

<small>I can't wait to celebrate with you 💖</small>

<button id="yes">Yes 💖</button>

<button id="no">No 🙈</button>

</div>

</div>

</div>

<div class="result" id="result">

<h1>🥳</h1>

<h2>Yay!</h2>

<p>Can't wait to celebrate with you! 💖</p>

</div>

<script>

document.getElementById("env").onclick=function(){
this.classList.add("open");
}

const no=document.getElementById("no");

function moveButton(){

const x=Math.random()*220-110;

const y=Math.random()*180-90;

no.style.transform=`translate(${x}px,${y}px)`;

}

no.addEventListener("mouseenter",moveButton);
no.addEventListener("touchstart",moveButton);

document.getElementById("yes").onclick=function(){

document.getElementById("result").style.display="flex";

confetti();

}

function confetti(){

const canvas=document.getElementById("confetti");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

let pieces=[];

for(let i=0;i<250;i++){

pieces.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height-canvas.height,

r:Math.random()*6+2,

c:`hsl(${Math.random()*360},100%,60%)`

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach(p=>{

ctx.fillStyle=p.c;

ctx.beginPath();

ctx.arc(p.x,p.y,p.r,0,Math.PI*2);

ctx.fill();

p.y+=5;

});

requestAnimationFrame(draw);

}

draw();

}

setInterval(()=>{

const h=document.createElement("div");

h.className="heart";

h.innerHTML=Math.random()>.5?"💖":"✨";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(20+Math.random()*20)+"px";

h.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),9000);

},500);

</script>

</body>
</html>
